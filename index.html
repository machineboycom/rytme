<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>rytme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #00272e;
      }
      canvas {
        display: block;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #00272e;
        -webkit-user-select: none;
        user-select: none;
      }
      #date-text {
        font-family: Arial, sans-serif;
        font-size: clamp(14px, 2.5vw, 22px);
        color: #8888aa;
        margin-bottom: 16px;
      }
      #info {
        font-family: Arial, sans-serif;
        font-size: 1.2rem;
        color: #f0f0f0;
        text-align: center;
        margin-bottom: 40px;
      }
      #rytme-logo {
        width: clamp(280px, 40vw, 360px);
        margin-bottom: 40px;
      }
      #start-btn {
        font-family: Arial, sans-serif;
        font-size: clamp(20px, 4vw, 32px);
        font-weight: bold;
        color: #f0f0f0;
        background: #12c4a7;
        border: none;
        border-radius: 50%;
        width: clamp(120px, 25vw, 200px);
        height: clamp(120px, 25vw, 200px);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #start-btn:active {
        opacity: 0.7;
      }
      #overlay.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <p id="date-text"></p>
      <img id="rytme-logo" src="/rytme.svg" alt="rytme" />
      <div id="info">
        <p>Følg med på rytmen og gjenta den!</p>
        <p>Ny rytme hver dag!</p>
      </div>
      <button id="start-btn">START</button>
    </div>
    <script>
      const d = new Date();
      const parts = d
        .toLocaleDateString("nb-NO", {
          weekday: "long",
          day: "numeric",
          month: "long",
        })
        .split(" ");
      parts[0] = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
      document.getElementById("date-text").textContent = parts
        .join(" ")
        .replace(". ", ".");
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
