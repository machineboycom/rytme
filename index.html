<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>rytme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #00272e;
      }
      canvas {
        display: block;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #00272e;
        -webkit-user-select: none;
        user-select: none;
      }
      #overlay h1 {
        font-family: Arial, sans-serif;
        font-size: clamp(64px, 10vw, 128px);
        font-weight: bold;
        color: #f0f0f0;
        margin-bottom: 40px;
        letter-spacing: 6px;
      }
      #start-btn {
        font-family: Arial, sans-serif;
        font-size: clamp(20px, 4vw, 32px);
        font-weight: bold;
        color: #f0f0f0;
        background: #12c4a7;
        border: none;
        border-radius: 50%;
        width: clamp(120px, 25vw, 200px);
        height: clamp(120px, 25vw, 200px);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #start-btn:active {
        opacity: 0.7;
      }
      #overlay.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>RYTME</h1>
      <button id="start-btn">START</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
